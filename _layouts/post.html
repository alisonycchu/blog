---
layout: default
---
<style>
  /* Underline all links inside the post content by default */
  .post-body a {
    text-decoration: underline;
    text-underline-offset: 2px; /* Keeps it neat and readable */
  }

  /* Your existing hover code still works, but this ensures it stays styled correctly */
  .post-body a:hover {
    text-decoration: underline;
  }
</style>

<article>
  <h1>{{ page.title }}</h1>
  <p class="post-date">
    <time id="post-date" datetime="{{ page.date | date_to_xmlschema }}">
      {{ page.date | date: "%d %B %Y %H:%M" }}
    </time>
  </p>
  
  <!-- Wrapped content in a div class so the underlines don't bleed into your titles or tags -->
  <div class="post-body">
    {{ content }}
  </div>

  {% if page.tags.size > 0 %}
    <div class="post-tags">
      Tags: {{ page.tags | join: ", " }}
    </div>
  {% endif %}
  
  {% if page.last_modified_at %}
    <p class="post-updated">
      <small>
        Last edited <time class="post-updated-time" datetime="{{ page.last_modified_at | date_to_xmlschema }}">
          {{ page.last_modified_at | date: "%d %B %Y %H:%M" }}
        </time>
      </small>
    </p>
  {% endif %}
</article>

<script>
  (function() {
    var dateEls = document.querySelectorAll('#post-date, .post-updated-time');
    if (!dateEls.length) return;

    var formatter = new Intl.DateTimeFormat('en-GB', {
      month: 'long',
      day: '2-digit',
      year: 'numeric',
      hour: '2-digit',
      minute: '2-digit',
      hour12: false
    });

    dateEls.forEach(function(timeEl) {
      var iso = timeEl.getAttribute('datetime');
      if (!iso) return;
      var date = new Date(iso);
      if (isNaN(date.getTime())) return;
      timeEl.textContent = formatter.format(date);
    });
  })();
</script>
